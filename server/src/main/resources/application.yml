# ══ Base (always active) ════════════════════════════════════════════════════
spring:
  application:
    name: halo-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none        # Flyway owns the schema; Hibernate must not touch it
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

server:
  port: 8080

logging:
  level:
    com.safesoundla.halo: DEBUG

# DB toggle — false by default so the server boots without PostgreSQL.
# Set to true (via the "db" Spring profile below) when user-data features are active.
halo:
  db:
    enabled: false
  routing:
    safety-weight: 1.0   # see RoutingProperties; 0.0=pure-shortest, 1.0=default, 2.0+=safety-biased
  ai-data:
    segments-path: ${HALO_AI_DATA_SEGMENTS_PATH:classpath:ai-data/segments.geojson}
    wsi-scores-path: ${HALO_AI_DATA_WSI_SCORES_PATH:classpath:ai-data/wsi_scores.json}
    safezones-path: ${HALO_AI_DATA_SAFEZONES_PATH:classpath:ai-data/safezones.geojson}

# ══ DB disabled — active when "db" profile is NOT present (the default) ═════
---
spring:
  config:
    activate:
      on-profile: "!db"
  # Exclude DataSource / JPA autoconfiguration (Spring Boot 4.x package names).
  # This lets the server start without a PostgreSQL connection.
  # Flyway is managed by FlywayConfig.kt (@ConditionalOnProperty) — no exclusion needed.
  # Removed automatically when the "db" profile is added (see section below).
  autoconfigure:
    exclude:
      - org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration
      - org.springframework.boot.hibernate.autoconfigure.HibernateJpaAutoConfiguration
      - org.springframework.boot.data.jpa.autoconfigure.DataJpaRepositoriesAutoConfiguration
      - org.springframework.boot.jdbc.autoconfigure.DataSourceTransactionManagerAutoConfiguration

# ══ DB enabled — activate with SPRING_PROFILES_ACTIVE=local,db ══════════════
---
spring:
  config:
    activate:
      on-profile: db
  # No autoconfigure.exclude here → DataSource/JPA/Flyway autoconfiguration runs.
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/halo}
    username: ${SPRING_DATASOURCE_USERNAME:halo}
    password: ${SPRING_DATASOURCE_PASSWORD:halo_secret}
    driver-class-name: org.postgresql.Driver

halo:
  db:
    enabled: true
