# Copy this file to application-local.yml (gitignored) and fill in your local values
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/halo
    username: halo
    password: halo_secret
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# CORS: allow Flutter web dev server and Android emulator
app:
  cors:
    allowed-origins:
      - "http://localhost:3000"
      - "http://localhost:5173"
      - "http://10.0.2.2:8080"
