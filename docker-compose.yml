version: "3.9"

# ── How to use ─────────────────────────────────────────────────────────────
#
# Default (no DB):
#   docker-compose up server
#   Server boots from AI data files only. No PostgreSQL needed.
#
# With DB (user-data features):
#   docker-compose --profile db up
#   Starts PostgreSQL + the server with the "db" Spring profile active.
#   Flyway migrations run automatically on first boot.
#
# Dev tip: skip the server container and run Spring locally instead:
#   docker-compose --profile db up db   # DB only
#   cd server && SPRING_PROFILES_ACTIVE=local,db ./gradlew bootRun
# ────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL + PostGIS ──────────────────────────────────────────────────
  # Only starts when --profile db is passed.
  db:
    profiles: [db]
    image: postgis/postgis:16-3.4
    container_name: halo-db
    environment:
      POSTGRES_DB: halo
      POSTGRES_USER: halo
      POSTGRES_PASSWORD: halo_secret
    ports:
      - "5432:5432"
    volumes:
      - halo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U halo -d halo"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Spring Boot API — no DB (default) ────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: halo-server
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local

  # ── Spring Boot API — with DB ────────────────────────────────────────────
  # Started automatically when --profile db is used.
  server-db:
    profiles: [db]
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: halo-server-db
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local,db
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/halo
      SPRING_DATASOURCE_USERNAME: halo
      SPRING_DATASOURCE_PASSWORD: halo_secret
    depends_on:
      db:
        condition: service_healthy


volumes:
  halo_pgdata:
