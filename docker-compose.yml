version: "3.9"

services:
  # ── PostgreSQL + PostGIS ─────────────────────────────────────────────────
  db:
    image: postgis/postgis:16-3.4
    container_name: halo-db
    environment:
      POSTGRES_DB: halo
      POSTGRES_USER: halo
      POSTGRES_PASSWORD: halo_secret
    ports:
      - "5432:5432"
    volumes:
      - halo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U halo -d halo"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Spring Boot API ──────────────────────────────────────────────────────
  # Tip: during active development, run Spring from your IDE instead.
  # Comment this service out and run: cd server && ./gradlew bootRun
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: halo-server
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/halo
      SPRING_DATASOURCE_USERNAME: halo
      SPRING_DATASOURCE_PASSWORD: halo_secret
    depends_on:
      db:
        condition: service_healthy


volumes:
  halo_pgdata:
