name: halo
description: "Halo — environment-aware pedestrian routing app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Networking
  dio: ^5.7.0

  # Map — flutter_map uses OpenStreetMap tiles (no API key, MIT license).
  # Color overlays via Polyline widget are natively supported.
  # To switch to Google Maps: change TileLayer URL only.
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Routing
  go_router: ^14.6.2

  # Env config
  flutter_dotenv: ^5.2.1

  # Location
  geolocator: ^13.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_lint: ^2.6.5
  custom_lint: ^0.7.5

flutter:
  uses-material-design: true
  assets:
    - .env
